[[rule]]
toolName = "run_shell_command"
commandRegex = "rm(?![^\"]* (?!-|test_)[^\\s\"])[^\"]*\""
decision = "allow"
priority = 250

[[rule]]
toolName = "run_shell_command"
commandRegex = ".*\\brm\\b.*"
decision = "ask_user"
priority = 200

[[rule]]
toolName = "run_shell_command"
commandRegex = ".*\\bjj\\s+(absorb|rebase|squash|amend|abandon|edit|split|unsquash|restore|undo|op).*$"
decision = "ask_user"
priority = 200

[[rule]]
toolName = "run_shell_command"
commandRegex = "jj\\s+git\\b.*"
decision = "allow"
priority = 250

[[rule]]
toolName = "run_shell_command"
commandRegex = ".*"
decision = "allow"
priority = 100

[[rule]]
toolName = "activate_skill"
decision = "allow"
priority = 100

[[rule]]
toolName = "read_file"
decision = "allow"
priority = 100

[[rule]]
toolName = ["write_file", "replace"]
decision = "allow"
priority = 100
